<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whatamesh</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
    }
    #gradient-canvas {
        width: 100%;
        height: 100%;
        --gradient-color-1: #c3e4ff;
        --gradient-color-2: #6ec3f4;
        --gradient-color-3: #eae2ff;
        --gradient-color-4: #b9beff;
    }
    #ui {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        z-index: 10;
    }
    #palettes {
        display: flex;
        gap: 12px;
    }
    .palette-btn {
        display: flex;
        gap: 3px;
        padding: 5px;
        border-radius: 12px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(6px);
        border: 2px solid transparent;
        cursor: pointer;
        transition: border-color 0.4s, transform 0.2s;
    }
    .palette-btn.active {
        border-color: rgba(255,255,255,0.85);
        transform: scale(1.12);
    }
    .swatch {
        width: 14px;
        height: 28px;
        border-radius: 5px;
    }
    #progress-bar-wrap {
        width: 260px;
        height: 4px;
        background: rgba(255,255,255,0.25);
        border-radius: 2px;
        overflow: hidden;
    }
    #progress-bar {
        height: 100%;
        width: 0%;
        background: rgba(255,255,255,0.8);
        border-radius: 2px;
    }
    #palette-label {
        color: rgba(255,255,255,0.85);
        font-size: 13px;
        letter-spacing: 0.05em;
        text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
</style>
</head>
<body>
    <canvas id="gradient-canvas" data-transition-in></canvas>

    <div id="ui">
        <div id="palettes"></div>
        <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
        <div id="palette-label"></div>
    </div>

    <script type="module">
        import { Gradient } from 'https://esm.sh/whatamesh';

        const TRANSITION_MS = 6000;

        const palettes = [
            { name: "Sky",      colors: ["#c3e4ff", "#6ec3f4", "#eae2ff", "#b9beff"] },
            { name: "Sunset",   colors: ["#ffb7b2", "#ff9a9e", "#ffdac1", "#fad0c4"] },
            { name: "Forest",   colors: ["#b7f8db", "#50a7c2", "#a8edea", "#8ec5fc"] },
            { name: "Lavender", colors: ["#e0c3fc", "#8ec5fc", "#d4b8e0", "#c3cfe2"] },
            { name: "Ember",    colors: ["#f7971e", "#ffd200", "#fcb045", "#ffccba"] },
            { name: "Twilight", colors: ["#a18cd1", "#fbc2eb", "#a1c4fd", "#c2e9fb"] },
        ];

        function normalize(hex) {
            const n = parseInt(hex.replace('#',''), 16);
            return [(n >> 16 & 255)/255, (n >> 8 & 255)/255, (n & 255)/255];
        }

        function lerpColor(a, b, t) {
            return [
                a[0] + (b[0] - a[0]) * t,
                a[1] + (b[1] - a[1]) * t,
                a[2] + (b[2] - a[2]) * t,
            ];
        }

        const normPalettes = palettes.map(p => p.colors.map(normalize));

        // Build palette UI
        const palettesEl = document.getElementById('palettes');
        const btns = palettes.map((p, i) => {
            const btn = document.createElement('div');
            btn.className = 'palette-btn' + (i === 0 ? ' active' : '');
            p.colors.forEach(hex => {
                const s = document.createElement('div');
                s.className = 'swatch';
                s.style.background = hex;
                btn.appendChild(s);
            });
            palettesEl.appendChild(btn);
            return btn;
        });

        const progressBar = document.getElementById('progress-bar');
        const labelEl = document.getElementById('palette-label');

        const gradient = new Gradient();
        window.gradient = gradient;

        gradient.seed = Math.random();
        gradient.updateFrequency(14e-5);
        gradient.initGradient('#gradient-canvas');

        function setColors(colors) {
            // Color 0 → u_baseColor.value
            gradient.uniforms.u_baseColor.value = colors[0];
            // Colors 1-3 → u_waveLayers[i].value.color.value
            for (let i = 1; i < colors.length; i++) {
                gradient.uniforms.u_waveLayers.value[i - 1].value.color.value = colors[i];
            }
        }

        let startTime = null;
        let currentIndex = 0;

        function setActive(i) {
            btns.forEach((b, j) => b.classList.toggle('active', j === i));
            labelEl.textContent = palettes[i].name + ' → ' + palettes[(i + 1) % palettes.length].name;
        }
        setActive(0);

        function animate(ts) {
            if (startTime === null) startTime = ts;
            const elapsed = ts - startTime;
            const t = Math.min(elapsed / TRANSITION_MS, 1);

            const from = normPalettes[currentIndex];
            const to   = normPalettes[(currentIndex + 1) % normPalettes.length];
            const blended = from.map((fc, i) => lerpColor(fc, to[i], t));

            setColors(blended);

            progressBar.style.width = (t * 100) + '%';

            if (t >= 1) {
                currentIndex = (currentIndex + 1) % palettes.length;
                startTime = ts;
                setActive(currentIndex);
            }

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
