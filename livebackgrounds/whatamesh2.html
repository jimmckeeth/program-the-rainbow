<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }
    #gradient-canvas {
        width: 100%;
        height: 100%;
        /* Standard CSS variables - whatamesh requires standard hex values here */
        --gradient-color-1: #c3e4ff; 
        --gradient-color-2: #6ec3f4; 
        --gradient-color-3: #eae2ff;  
        --gradient-color-4: #b9beff;
    }
</style>

<body>
    <canvas id="gradient-canvas" data-transition-in></canvas>

    <script type="module">
        import { Gradient } from 'https://esm.sh/whatamesh';

        const gradient = new Gradient();
        window.gradient = gradient;
        gradient.initGradient('#gradient-canvas');

        // 1. Helper to match whatamesh's internal color format
        function normalizeColor(hexCode) {
            const hex = parseInt(hexCode.replace('#', '0x'));
            return [
                ((hex >> 16) & 255) / 255,
                ((hex >> 8) & 255) / 255,
                (255 & hex) / 255,
            ];
        }

        // 2. Helper for smooth transitions
        function lerp(start, end, amt) {
            return (1 - amt) * start + amt * end;
        }

        // 3. Define the palette to transition to
        const targetColors = [
            normalizeColor('#ff9a9e'),
            normalizeColor('#fecfef'),
            normalizeColor('#a18cd1'),
            normalizeColor('#fbc2eb')
        ];

        // Wait for whatamesh to finish loading CSS vars before accessing uniforms
        const checkReady = setInterval(() => {
            if (gradient.uniforms) {
                clearInterval(checkReady);

                startColorTransitions();
            }
